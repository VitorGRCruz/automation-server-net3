services:
  temporal-postgresql:
    image: ${TEMPORAL_POSTGRES_IMAGE:-postgres:16}
    environment:
      POSTGRES_PASSWORD: ${TEMPORAL_POSTGRES_PASSWORD:-temporal}
      POSTGRES_USER: ${TEMPORAL_POSTGRES_USER:-temporal}
    ports:
      - "${TEMPORAL_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h 127.0.0.1 -p 5432 -U $$POSTGRES_USER -d postgres",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 25s
    volumes:
      - temporal-postgresql-data:/var/lib/postgresql/data
    restart: unless-stopped

  temporal:
    image: ${TEMPORAL_PROD_IMAGE:-temporalio/auto-setup:1.29.1}
    depends_on:
      temporal-postgresql:
        condition: service_healthy
    environment:
      DB: ${TEMPORAL_DB_DRIVER:-postgres12}
      DB_PORT: 5432
      DBNAME: ${TEMPORAL_POSTGRES_DB:-temporal}
      VISIBILITY_DBNAME: ${TEMPORAL_VISIBILITY_POSTGRES_DB:-temporal_visibility}
      POSTGRES_USER: ${TEMPORAL_POSTGRES_USER:-temporal}
      POSTGRES_PWD: ${TEMPORAL_POSTGRES_PASSWORD:-temporal}
      POSTGRES_SEEDS: temporal-postgresql
      SKIP_DB_CREATE: ${TEMPORAL_SKIP_DB_CREATE:-false}
      SKIP_SCHEMA_SETUP: ${TEMPORAL_SKIP_SCHEMA_SETUP:-false}
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/docker-prod.yaml
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CLI_ADDRESS: temporal:7233
      DEFAULT_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
      DEFAULT_NAMESPACE_RETENTION: ${TEMPORAL_DEFAULT_NAMESPACE_RETENTION:-72h}
      SKIP_DEFAULT_NAMESPACE_CREATION: ${TEMPORAL_SKIP_DEFAULT_NAMESPACE_CREATION:-false}
    ports:
      - "${TEMPORAL_FRONTEND_PORT:-7233}:7233"
    volumes:
      - ./docker/temporal/dynamicconfig:/etc/temporal/config/dynamicconfig:ro
    restart: unless-stopped

  temporal-admin-tools:
    image: ${TEMPORAL_ADMINTOOLS_IMAGE:-temporalio/admin-tools:1.29.1-tctl-1.18.4-cli-1.5.0}
    depends_on:
      temporal:
        condition: service_started
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CLI_ADDRESS: temporal:7233
    restart: unless-stopped
    stdin_open: true
    tty: true

  temporal-ui:
    image: ${TEMPORAL_UI_IMAGE:-temporalio/ui:2.34.0}
    depends_on:
      temporal:
        condition: service_started
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: ${TEMPORAL_UI_CORS_ORIGINS:-http://localhost:3000}
    ports:
      - "${TEMPORAL_UI_PORT:-8233}:8080"
    restart: unless-stopped

volumes:
  temporal-postgresql-data:
