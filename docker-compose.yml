# Ambiente local com build imutavel dos servicos Node.
# Nao representa a topologia completa de producao.
x-node-image: &node-image automation-server-net3-runtime:local
x-node-build: &node-build
  context: .
  dockerfile: Dockerfile

x-runtime-environment: &runtime-environment
  TZ: ${TZ:-America/Cuiaba}
  NODE_ENV: ${NODE_ENV:-production}
  APP_LOG_LEVEL: ${APP_LOG_LEVEL:-info}
  BASIC_AUTH_ENABLED: ${BASIC_AUTH_ENABLED:-false}
  BASIC_AUTH_USERNAME: ${BASIC_AUTH_USERNAME:-admin}
  BASIC_AUTH_PASSWORD: ${BASIC_AUTH_PASSWORD:-change-me}
  TEMPORAL_ADDRESS: temporal:7233
  TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
  SYSTEM_DB_HOST: system-db
  SYSTEM_DB_PORT: 3306
  SYSTEM_DB_DATABASE: ${SYSTEM_DB_DATABASE:-automation_server}
  SYSTEM_DB_USERNAME: ${SYSTEM_DB_USERNAME:-automation}
  SYSTEM_DB_PASSWORD: ${SYSTEM_DB_PASSWORD:-change-me}
  SYSTEM_DB_CONNECT_TIMEOUT_MS: ${SYSTEM_DB_CONNECT_TIMEOUT_MS:-10000}
  SYSTEM_DB_CONNECTION_LIMIT: ${SYSTEM_DB_CONNECTION_LIMIT:-5}
  CSAT_TRIGGER_SCHEDULE_ENABLED: ${CSAT_TRIGGER_SCHEDULE_ENABLED:-false}
  CSAT_TRIGGER_SCHEDULE_ID: ${CSAT_TRIGGER_SCHEDULE_ID:-csat-start-survey-hourly}
  CSAT_TRIGGER_SCHEDULE_INTERVAL_MINUTES: ${CSAT_TRIGGER_SCHEDULE_INTERVAL_MINUTES:-60}
  CSAT_TRIGGER_SCHEDULE_TASK_QUEUE: ${CSAT_TRIGGER_SCHEDULE_TASK_QUEUE:-automation-control}
  CSAT_TRIGGER_SCHEDULE_WORKFLOW_ID: ${CSAT_TRIGGER_SCHEDULE_WORKFLOW_ID:-csat-start-survey/schedule}
  COBRANCAS_EQUIPMENT_RETRIEVAL_TRIGGER_SCHEDULE_ENABLED: ${COBRANCAS_EQUIPMENT_RETRIEVAL_TRIGGER_SCHEDULE_ENABLED:-false}
  COBRANCAS_EQUIPMENT_RETRIEVAL_TRIGGER_SCHEDULE_ID: ${COBRANCAS_EQUIPMENT_RETRIEVAL_TRIGGER_SCHEDULE_ID:-cobrancas-equipment-retrieval-verification-every-30-minutes}
  COBRANCAS_EQUIPMENT_RETRIEVAL_TRIGGER_SCHEDULE_INTERVAL_MINUTES: ${COBRANCAS_EQUIPMENT_RETRIEVAL_TRIGGER_SCHEDULE_INTERVAL_MINUTES:-30}
  COBRANCAS_EQUIPMENT_RETRIEVAL_TRIGGER_SCHEDULE_TASK_QUEUE: ${COBRANCAS_EQUIPMENT_RETRIEVAL_TRIGGER_SCHEDULE_TASK_QUEUE:-automation-control}
  COBRANCAS_EQUIPMENT_RETRIEVAL_TRIGGER_SCHEDULE_WORKFLOW_ID: ${COBRANCAS_EQUIPMENT_RETRIEVAL_TRIGGER_SCHEDULE_WORKFLOW_ID:-cobrancas-equipment-retrieval-verification/schedule}
  COBRANCAS_EQUIPMENT_RETRIEVAL_TRIGGER_SCHEDULE_TIMEZONE: ${COBRANCAS_EQUIPMENT_RETRIEVAL_TRIGGER_SCHEDULE_TIMEZONE:-America/Campo_Grande}
  COBRANCAS_EQUIPMENT_RETRIEVAL_TRIGGER_SCHEDULE_WINDOW_START_HOUR: ${COBRANCAS_EQUIPMENT_RETRIEVAL_TRIGGER_SCHEDULE_WINDOW_START_HOUR:-8}
  COBRANCAS_EQUIPMENT_RETRIEVAL_TRIGGER_SCHEDULE_WINDOW_START_MINUTE: ${COBRANCAS_EQUIPMENT_RETRIEVAL_TRIGGER_SCHEDULE_WINDOW_START_MINUTE:-30}
  COBRANCAS_EQUIPMENT_RETRIEVAL_TRIGGER_SCHEDULE_WINDOW_END_HOUR: ${COBRANCAS_EQUIPMENT_RETRIEVAL_TRIGGER_SCHEDULE_WINDOW_END_HOUR:-20}
  COBRANCAS_EQUIPMENT_RETRIEVAL_TRIGGER_SCHEDULE_WINDOW_END_MINUTE: ${COBRANCAS_EQUIPMENT_RETRIEVAL_TRIGGER_SCHEDULE_WINDOW_END_MINUTE:-30}
  COBRANCAS_EQUIPMENT_RETRIEVAL_TRIGGER_START_AT: ${COBRANCAS_EQUIPMENT_RETRIEVAL_TRIGGER_START_AT:-2026-01-01 00:00:00}
  NFE_EMAIL_DISPATCH_DISCOVERY_SCHEDULE_ENABLED: ${NFE_EMAIL_DISPATCH_DISCOVERY_SCHEDULE_ENABLED:-false}
  NFE_EMAIL_DISPATCH_DISCOVERY_SCHEDULE_ID: ${NFE_EMAIL_DISPATCH_DISCOVERY_SCHEDULE_ID:-nfe-email-dispatch-discovery-daily-0300}
  NFE_EMAIL_DISPATCH_DISCOVERY_SCHEDULE_TASK_QUEUE: ${NFE_EMAIL_DISPATCH_DISCOVERY_SCHEDULE_TASK_QUEUE:-automation-control}
  NFE_EMAIL_DISPATCH_DISCOVERY_SCHEDULE_WORKFLOW_ID: ${NFE_EMAIL_DISPATCH_DISCOVERY_SCHEDULE_WORKFLOW_ID:-nfe-email-dispatch/discovery/schedule}
  NFE_EMAIL_DISPATCH_DISCOVERY_SCHEDULE_TIMEZONE: ${NFE_EMAIL_DISPATCH_DISCOVERY_SCHEDULE_TIMEZONE:-America/Campo_Grande}
  NFE_EMAIL_DISPATCH_DISCOVERY_SCHEDULE_HOUR: ${NFE_EMAIL_DISPATCH_DISCOVERY_SCHEDULE_HOUR:-3}
  NFE_EMAIL_DISPATCH_DISCOVERY_SCHEDULE_MINUTE: ${NFE_EMAIL_DISPATCH_DISCOVERY_SCHEDULE_MINUTE:-0}
  NFE_EMAIL_DISPATCH_PROCESSING_SCHEDULE_ENABLED: ${NFE_EMAIL_DISPATCH_PROCESSING_SCHEDULE_ENABLED:-false}
  NFE_EMAIL_DISPATCH_PROCESSING_SCHEDULE_ID: ${NFE_EMAIL_DISPATCH_PROCESSING_SCHEDULE_ID:-nfe-email-dispatch-processing-daily-0800}
  NFE_EMAIL_DISPATCH_PROCESSING_SCHEDULE_TASK_QUEUE: ${NFE_EMAIL_DISPATCH_PROCESSING_SCHEDULE_TASK_QUEUE:-automation-control}
  NFE_EMAIL_DISPATCH_PROCESSING_SCHEDULE_WORKFLOW_ID: ${NFE_EMAIL_DISPATCH_PROCESSING_SCHEDULE_WORKFLOW_ID:-nfe-email-dispatch/processing/schedule}
  NFE_EMAIL_DISPATCH_PROCESSING_SCHEDULE_TIMEZONE: ${NFE_EMAIL_DISPATCH_PROCESSING_SCHEDULE_TIMEZONE:-America/Campo_Grande}
  NFE_EMAIL_DISPATCH_PROCESSING_SCHEDULE_HOUR: ${NFE_EMAIL_DISPATCH_PROCESSING_SCHEDULE_HOUR:-8}
  NFE_EMAIL_DISPATCH_PROCESSING_SCHEDULE_MINUTE: ${NFE_EMAIL_DISPATCH_PROCESSING_SCHEDULE_MINUTE:-0}
  NFE_EMAIL_DISPATCH_DISCOVERY_WINDOW_DAYS: ${NFE_EMAIL_DISPATCH_DISCOVERY_WINDOW_DAYS:-15}
  NFE_EMAIL_DISPATCH_MAX_CONCURRENT_CHILDREN: ${NFE_EMAIL_DISPATCH_MAX_CONCURRENT_CHILDREN:-5}
  NFE_EMAIL_DISPATCH_MAX_SEND_ATTEMPTS: ${NFE_EMAIL_DISPATCH_MAX_SEND_ATTEMPTS:-3}
  NFE_EMAIL_DISPATCH_PDF_TMP_DIR: ${NFE_EMAIL_DISPATCH_PDF_TMP_DIR:-/var/tmp/nfe-email-dispatch}
  ERP_DB_HOST: ${ERP_DB_HOST:-localhost}
  ERP_DB_PORT: ${ERP_DB_PORT:-3306}
  ERP_DB_DATABASE: ${ERP_DB_DATABASE:-}
  ERP_DB_NAME: ${ERP_DB_NAME:-}
  ERP_DB_USERNAME: ${ERP_DB_USERNAME:-}
  ERP_DB_USER: ${ERP_DB_USER:-}
  ERP_DB_PASSWORD: ${ERP_DB_PASSWORD:-change-me}
  ERP_DB_CONNECT_TIMEOUT_MS: ${ERP_DB_CONNECT_TIMEOUT_MS:-10000}
  ERP_DB_CONNECTION_LIMIT: ${ERP_DB_CONNECTION_LIMIT:-5}
  OPA_BASE_URL: ${OPA_BASE_URL:-https://opa.local}
  OPA_API_TOKEN: ${OPA_API_TOKEN:-change-me}
  OPA_API_TIMEOUT_MS: ${OPA_API_TIMEOUT_MS:-10000}
  IXC_BASE_URL: ${IXC_BASE_URL:-https://ixc.local}
  IXC_BASIC_AUTH_CREDENTIAL: ${IXC_BASIC_AUTH_CREDENTIAL:-}
  IXC_API_TOKEN: ${IXC_API_TOKEN:-}
  IXC_API_TIMEOUT_MS: ${IXC_API_TIMEOUT_MS:-10000}

x-node-service: &node-service
  build: *node-build
  image: *node-image
  environment:
    <<: *runtime-environment
  depends_on:
    temporal:
      condition: service_started
    system-db:
      condition: service_healthy
  extra_hosts:
    - "host.docker.internal:host-gateway"
  restart: unless-stopped

services:
  temporal:
    image: temporalio/temporal:1.6.2@sha256:896dc523ec52eaa18873c45ddf9df83ecb33d7e12dd19481bf032565657c6028
    command: server start-dev --ip 0.0.0.0
    ports:
      - "7233:7233"
      - "8233:8233"
    restart: unless-stopped

  system-db:
    image: mariadb:11.4@sha256:3b4dfcc32247eb07adbebec0793afae2a8eafa6860ec523ee56af4d3dec42f7f
    command: ["mariadbd", "--default-time-zone=-04:00"]
    environment:
      TZ: ${TZ:-America/Cuiaba}
      MARIADB_ROOT_PASSWORD: ${SYSTEM_DB_PASSWORD:-change-me}
      MARIADB_DATABASE: ${SYSTEM_DB_DATABASE:-automation_server}
      MARIADB_USER: ${SYSTEM_DB_USERNAME:-automation}
      MARIADB_PASSWORD: ${SYSTEM_DB_PASSWORD:-change-me}
    ports:
      - "${SYSTEM_DB_PORT:-3306}:3306"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mariadb-admin ping -h 127.0.0.1 -u$$MARIADB_USER -p$$MARIADB_PASSWORD --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 25s
    volumes:
      - system-mariadb-data:/var/lib/mysql
    restart: unless-stopped

  api:
    <<: *node-service
    profiles:
      - api
    command: ["node", "dist/app/server.js"]
    environment:
      <<: *runtime-environment
      APP_HOST: 0.0.0.0
      APP_PORT: ${APP_PORT:-3000}
    ports:
      - "${APP_PORT:-3000}:${APP_PORT:-3000}"

  worker-control:
    <<: *node-service
    command: ["node", "dist/temporal/worker/run-control-worker.js"]
    volumes:
      - nfe-email-dispatch-tmp:/var/tmp/nfe-email-dispatch

  worker-erp-read:
    <<: *node-service
    command: ["node", "dist/temporal/worker/run-erp-read-worker.js"]

  worker-opa:
    <<: *node-service
    command: ["node", "dist/temporal/worker/run-opa-worker.js"]

  worker-ixc:
    <<: *node-service
    command: ["node", "dist/temporal/worker/run-ixc-worker.js"]
    volumes:
      - nfe-email-dispatch-tmp:/var/tmp/nfe-email-dispatch

volumes:
  system-mariadb-data:
  nfe-email-dispatch-tmp:
